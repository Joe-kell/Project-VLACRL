defaults:
- env/train: libero_object
- env/eval: libero_object
- override hydra/job_logging: stdout
hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
  - file://${oc.env:EMBODIED_PATH}/config/
cluster:
  num_nodes: 1
  component_placement:
    actor: 0-2
    rollout: '3'
    env: '3'
  ray_object_store_memory: 461708984320
runner:
  task_type: embodied
  logger:
    log_path: ../results
    project_name: rlinf
    experiment_name: test_openvla
    logger_backends:
    - tensorboard
  max_epochs: 1
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: 1
  seq_length: 4096
  max_prompt_length: 128
  resume_global_step: 0
  stop_unix_time: 1777568239
  partial_resume_exit_code: 85
  resume_save_grace_seconds: 1800
  rolling_checkpoint:
    enabled: true
    latest_name: latest_partial
    previous_name: previous_partial
    tmp_name: latest_partial_tmp
    keep_previous: true
algorithm:
  auto_reset: false
  ignore_terminations: false
  use_fixed_reset_state_ids: true
  require_values: false
  shuffle_samples: true
  normalize_advantages: true
  kl_penalty: kl
  group_size: 5
  n_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  n_eval_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  num_group_envs: 3
  rollout_epoch: 1
  eval_rollout_epoch: 32
  reward_type: step_level
  logprob_type: token_level
  entropy_type: token_level
  use_experience_replay: false
  bc_coeff: 0.0
  adv_type: embodied_grpo
  loss_type: embodied_grpo
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  sampling_params:
    use_greedy: false
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1
  filter_rewards: true
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
env:
  group_name: EnvGroup
  channel:
    name: env_buffer_list
    queue_name: obs_buffer
    queue_size: 0
  eval:
    num_envs: 20
    eval_per_task: ${int_div:${env.eval.num_envs}, 10}
  enable_offload: false
  fixed_task_ids:
  - 5
rollout:
  group_name: RolloutGroup
  channel:
    name: ${env.channel.name}
    queue_name: action_buffer
    queue_size: 0
  mode: colocate
  generation_backend: huggingface
  model_dir: ${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-object-traj1/
  enable_offload: true
  pipeline_stage_num: 1
actor:
  group_name: ActorGroup
  channel:
    name: ${env.channel.name}
    queue_name: replay_buffer
    queue_size: 0
  training_backend: fsdp
  checkpoint_load_path: ${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-object-traj1/
  micro_batch_size: 40
  global_batch_size: 960
  seed: 1234
  enable_offload: false
  model:
    model_name: openvla_oft
    value_type: ${algorithm.reward_type}
    action_dim: 7
    num_action_chunks: 8
    use_proprio: false
    unnorm_key: libero_object_no_noops
    center_crop: true
    precision: bf16
    add_bias_linear: false
    add_qkv_bias: true
    vocab_size: 32000
    hidden_size: 4096
    policy_setup: widowx_bridge
    vh_mode: a0
    image_size:
    - 224
    - 224
    is_lora: true
    lora_rank: 32
    partial_finetune: false
    layers_to_train: 50
    num_images_in_input: 1
    attn_implementation: flash_attention_2
    low_cpu_mem_usage: true
    trust_remote_code: true
    gradient_checkpointing: false
  optim:
    lr: 2.0e-05
    value_lr: 0.003
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    clip_grad: 1.0
  tokenizer:
    tokenizer_type: HuggingFaceTokenizer
    tokenizer_model: ${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-object-traj1/
    use_fast: false
    trust_remote_code: true
    padding_side: right
reward:
  use_reward_model: false
critic:
  use_critic_model: false
