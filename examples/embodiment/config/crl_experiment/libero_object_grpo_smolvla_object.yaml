defaults:
  - env/train: libero_object
  - env/eval: libero_object
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all
  ray_object_store_memory: 461708984320

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "train_smolvla"
    logger_backends: ["wandb"]

  max_epochs: 10
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 10
  seq_length: 4096
  max_prompt_length: 128

algorithm:
  auto_reset: False
  ignore_terminations: False
  use_fixed_reset_state_ids: True
  require_values: False
  shuffle_samples: True
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  n_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  n_eval_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  num_group_envs: 8
  rollout_epoch: 16
  eval_rollout_epoch: 8
  reward_type: step_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  use_experience_replay: False
  bc_coeff: 0.0
  adv_type: embodied_grpo
  loss_type: embodied_grpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    use_greedy: False
    temperature_train: 1.0
    temperature_eval: 1.0
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

env:
  group_name: "EnvGroup"
  channel:
    name: "env_buffer_list"
    queue_name: "obs_buffer"
    queue_size: 0
  eval:
    num_envs: 80
    eval_per_task: ${int_div:${env.eval.num_envs}, 10}
  enable_offload: False
  fixed_task_ids: [5]

rollout:
  group_name: "RolloutGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "action_buffer"
    queue_size: 0
  mode: "colocate"
  generation_backend: "huggingface"
  model_dir: "${oc.env:SMOLVLA_POLICY_PATH}"
  enable_offload: False
  pipeline_stage_num: 1

actor:
  group_name: "ActorGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "replay_buffer"
    queue_size: 0
  training_backend: "fsdp"
  checkpoint_load_path: "${oc.env:SMOLVLA_POLICY_PATH}"
  micro_batch_size: 8
  global_batch_size: 512
  seed: 1234
  enable_offload: False

  model:
    model_name: "smolvla"
    value_type: ${algorithm.reward_type}
    action_dim: 7
    num_action_chunks: 8
    use_proprio: False
    unnorm_key: libero_object_no_noops
    center_crop: True
    base_policy_path: "${oc.env:SMOLVLA_POLICY_PATH}"
    local_files_only: True
    use_amp: False
    zero_action_noise: False
    noise_method: "reinflow"
    train_action_std: 0.10
    min_action_std: 0.02
    policy_batch_prefix: "smolvla_pb__"
    log_action_stats: False
    max_parallel_tasks: 1
    empty_cameras: 1

    precision: "bf16"
    add_bias_linear: False
    add_qkv_bias: True
    vocab_size: 32000
    hidden_size: 4096
    policy_setup: "widowx_bridge"
    vh_mode: "a0"
    image_size: [224, 224]

    # SmolVLA LoRA options (parallel to OpenVLA knobs).
    # Set `is_lora=true` to train adapter-only; keep false for full-model chaining.
    is_lora: False
    lora_rank: 32
    lora_alpha: 32
    lora_dropout: 0.0
    lora_init: "gaussian"
    lora_components: ["all"]   # valid: all, llm, vision, projector, lm_head (model dependent)
    lora_target_modules: null  # explicit override list, e.g. ["q_proj","k_proj","v_proj","o_proj"]

    partial_finetune: False
    layers_to_train: 50
    num_images_in_input: 2
    attn_implementation: "flash_attention_2"
    low_cpu_mem_usage: True
    trust_remote_code: True
    gradient_checkpointing: False

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    clip_grad: 1.0

  tokenizer:
    tokenizer_type: "HuggingFaceTokenizer"
    tokenizer_model: "${oc.env:SMOLVLA_POLICY_PATH}"
    use_fast: False
    trust_remote_code: True
    padding_side: "right"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
